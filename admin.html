<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Menaxhimi i Menusë</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== STYLE I PLOTË ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: #2d2d2d;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 3px solid #d94f2b;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 300;
        }

        .logo span {
            color: #d94f2b;
            font-weight: 700;
        }

        .back-link {
            background: #404040;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .back-link:hover {
            background: #555;
        }

        .back-link i {
            color: #d94f2b;
        }

        /* Container kryesor */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        /* Header i adminit */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            color: white;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            font-size: 2.5rem;
            font-weight: 300;
        }

        .admin-header h1 i {
            color: #d94f2b;
            margin-right: 15px;
        }

        .btn-add {
            background: #d94f2b;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .btn-add:hover {
            background: #b33e1f;
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(217, 79, 43, 0.4);
        }

        /* Tabela e produkteve */
        .products-table {
            background: #2d2d2d;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #404040;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1.5fr 120px;
            background: #d94f2b;
            color: white;
            padding: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .table-row {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1.5fr 120px;
            padding: 20px;
            color: #e0e0e0;
            border-bottom: 1px solid #404040;
            align-items: center;
            transition: 0.2s;
        }

        .table-row:hover {
            background: #363636;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .product-thumb {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            overflow: hidden;
            background: #404040;
        }

        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-thumb {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1.5rem;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .product-cat {
            background: #404040;
            padding: 6px 16px;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.9rem;
            color: #d94f2b;
            font-weight: 600;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #d94f2b;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit {
            background: #2b6c9e;
            color: white;
        }

        .btn-edit:hover {
            background: #1e4f75;
            transform: scale(1.1);
        }

        .btn-delete {
            background: #9e2b2b;
            color: white;
        }

        .btn-delete:hover {
            background: #751e1e;
            transform: scale(1.1);
        }

        /* Modal per shtim/editim */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #2d2d2d;
            width: 90%;
            max-width: 700px;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid #404040;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        .modal-header h2 {
            font-size: 2rem;
        }

        .modal-header h2 i {
            color: #d94f2b;
            margin-right: 15px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #999;
            font-size: 3rem;
            cursor: pointer;
            line-height: 1;
        }

        .close-modal:hover {
            color: #d94f2b;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #e0e0e0;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px 20px;
            background: #404040;
            border: 2px solid #555;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #d94f2b;
            outline: none;
            background: #4a4a4a;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Image upload */
        .image-upload {
            border: 2px dashed #d94f2b;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #363636;
        }

        .image-upload:hover {
            background: #404040;
            border-color: #b33e1f;
        }

        .image-upload i {
            font-size: 3rem;
            color: #d94f2b;
            margin-bottom: 15px;
        }

        .image-upload p {
            color: #ccc;
        }

        .image-preview {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px auto 0;
            border: 3px solid #d94f2b;
            display: none;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-save {
            background: #d94f2b;
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }

        .btn-save:hover {
            background: #b33e1f;
        }

        /* Login form */
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: #2d2d2d;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #404040;
        }

        .login-form h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-form h2 i {
            color: #d94f2b;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #404040;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #d94f2b;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #b33e1f;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
        }

        /* Notification */
        .admin-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .table-header, .table-row {
                grid-template-columns: 60px 1.5fr 1fr 0.8fr 1fr 100px;
                font-size: 0.9rem;
                gap: 10px;
            }
        }

        @media (max-width: 768px) {
            .table-header {
                display: none;
            }
            
            .table-row {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 25px;
                border-bottom: 2px solid #404040;
            }
            
            .product-thumb {
                width: 100px;
                height: 100px;
                margin: 0 auto;
            }
            
            .action-buttons {
                justify-content: center;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <span>ARTE</span> GUSTO | ADMIN
        </div>
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kthehu te menuja
        </a>
    </nav>

    <div class="admin-container" id="adminContainer">
        <!-- Login form -->
        <div class="login-form" id="loginForm">
            <h2><i class="fas fa-lock"></i> Hyrja e Adminit</h2>
            <input type="password" id="passwordInput" class="login-input" placeholder="Fjalëkalimi" autofocus>
            <button class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Hyr
            </button>
            <div id="loginError" class="error-msg"></div>
        </div>

        <!-- Pjesa e menaxhimit (fillimisht e fshehur) -->
        <div id="adminPanel" style="display: none;">
            <div class="admin-header">
                <h1>
                    <i class="fas fa-utensils"></i> 
                    Menaxhimi i Menusë
                </h1>
                <button class="btn-add" id="addProductBtn">
                    <i class="fas fa-plus"></i> Shto Produkt të Ri
                </button>
            </div>

            <!-- Tabela e produkteve -->
            <div class="products-table">
                <div class="table-header">
                    <div>Foto</div>
                    <div>Emri</div>
                    <div>Kategoria</div>
                    <div>Çmimi</div>
                    <div>Përshkrimi</div>
                    <div>Veprime</div>
                </div>
                <div id="tableRows">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Duke ngarkuar produktet...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal per shtim/editim -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> <span id="modalTitle">Shto Produkt</span></h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>

            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label>Emri i produktit *</label>
                    <input type="text" id="productName" required placeholder="p.sh. Pizza Margherita">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Kategoria *</label>
                        <select id="productCategory" required>
                            <option value="">Zgjidh kategorinë</option>
                            <option value="Ushqim">Ushqim</option>
                            <option value="Pije">Pije</option>
                            <option value="Embelsira">Ëmbëlsira</option>
                            <option value="Pizza">Pizza</option>
                            <option value="Pasta">Pasta</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Çmimi (€) *</label>
                        <input type="number" id="productPrice" step="0.1" min="0" required placeholder="8.50">
                    </div>
                </div>

                <div class="form-group">
                    <label>Përshkrimi</label>
                    <textarea id="productDescription" placeholder="Përshkruani produktin... (opsionale)"></textarea>
                </div>

                <div class="form-group">
                    <label>Foto e produktit</label>
                    <div class="image-upload" id="imageUploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Klikoni për të ngarkuar foto</p>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    </div>
                    <div class="image-preview" id="imagePreview">
                        <img id="previewImg" src="" alt="Preview">
                    </div>
                </div>

                <button type="submit" class="btn-save" id="saveProductBtn">
                    <i class="fas fa-save"></i> Ruaj Ndryshimet
                </button>
            </form>
        </div>
    </div>

    <!-- JavaScript i Plotë -->
    <script>
    // ==================== KONFIGURIMI ====================
    // PËR SIGURI: Fjalëkalimi ruhet i koduar në Base64
    // Kjo është "arte2026" e koduar
    const ADMIN_PASSWORD_ENCODED = "YXJ0ZTIwMjY=";  // Base64 e "arte2026"
    
    // Të dhënat fillestare (nëse nuk ka asgjë në localStorage)
    const defaultMenu = [
        { 
            id: '1', 
            name: 'Makarona Bolognese', 
            category: 'Pasta', 
            price: 9.5, 
            description: 'Makarona të freskëta të përgatitura ditor me salcë mishi të pjekur ngadalë për 4 orë.',
            image: 'https://images.unsplash.com/photo-1622973536968-3ead9e780960?w=400&h=300&fit=crop'
        },
        { 
            id: '2', 
            name: 'Pizza Margherita', 
            category: 'Pizza', 
            price: 8.0, 
            description: 'Mozzarella e freskët, salcë domateje organike, borzilok i freskët dhe vaj ulliri.',
            image: 'https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=400&h=300&fit=crop'
        },
        { 
            id: '3', 
            name: 'Sallatë Cezar', 
            category: 'Ushqim', 
            price: 7.5, 
            description: 'Sallatë jeshile, pulë e pjekur në skarë, parmixhan, krutona dhe salcë cezar shtëpie.',
            image: 'https://images.unsplash.com/photo-1550304943-4f24f54ddde9?w=400&h=300&fit=crop'
        },
        { 
            id: '4', 
            name: 'Limonatë freskuese', 
            category: 'Pije', 
            price: 3.2, 
            description: 'Limon i freskët, nenexhik nga kopështi ynë, ujë mineral.',
            image: 'https://images.unsplash.com/photo-1621263764928-df1444c5e859?w=400&h=300&fit=crop'
        },
        { 
            id: '5', 
            name: 'Tiramisu klasik', 
            category: 'Embelsira', 
            price: 5.5, 
            description: 'Ëmbëlsirë tradicionale italiane me mascarpone, kafe ekspres dhe kakao.',
            image: 'https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400&h=300&fit=crop'
        },
        { 
            id: '6', 
            name: 'Pizza Diavola', 
            category: 'Pizza', 
            price: 11.0, 
            description: 'Sallam pikant, speca djegës, mozzarella dhe salcë domateje.',
            image: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=300&fit=crop'
        },
        { 
            id: '7', 
            name: 'Rizoto me kërpudha', 
            category: 'Ushqim', 
            price: 10.0, 
            description: 'Rizoto kremoz me kërpudha porcini dhe parmixhan të vjetër.',
            image: 'https://images.unsplash.com/photo-1633964913295-ceb43826a07f?w=400&h=300&fit=crop'
        },
        { 
            id: '8', 
            name: 'Panna Cotta', 
            category: 'Embelsira', 
            price: 4.5, 
            description: 'Panna cotta vanilje me salcë manaferrash të kuqe.',
            image: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&h=300&fit=crop'
        }
    ];

    // ==================== FUNKSIONI PËR DEKODIM ====================
    // Dekodon Base64 në string normal
    function decodeBase64(str) {
        return atob(str);
    }

    // ==================== VARIABLA GLOBALE ====================
    let menuData = [];

    // ==================== INICIALIZIMI ====================
    function initializeData() {
        // Kontrollo nëse ka të dhëna në localStorage
        const saved = localStorage.getItem('restaurantMenu');
        if (saved) {
            try {
                menuData = JSON.parse(saved);
                console.log('Të dhënat u ngarkuan nga localStorage:', menuData);
            } catch (e) {
                console.error('Gabim në parsing të localStorage, përdor default:', e);
                menuData = [...defaultMenu];
                saveToStorage();
            }
        } else {
            console.log('Nuk ka të dhëna, përdor default');
            menuData = [...defaultMenu];
            saveToStorage();
        }
    }

    // ==================== RUAJTJA ====================
    function saveToStorage() {
        try {
            localStorage.setItem('restaurantMenu', JSON.stringify(menuData));
            console.log('Të dhënat u ruajtën në localStorage:', menuData);
            
            // Shfaq njoftim
            showNotification('Të dhënat u ruajtën me sukses!');
            
            return true;
        } catch (e) {
            console.error('Gabim gjatë ruajtjes:', e);
            showNotification('Gabim gjatë ruajtjes!', 'error');
            return false;
        }
    }

    // ==================== NOTIFIKIMET ====================
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = 'admin-notification';
        
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        const bgColor = type === 'success' ? '#4CAF50' : '#f44336';
        
        notification.style.background = bgColor;
        notification.innerHTML = `
            <i class="fas ${icon}"></i>
            <span>${message}</span>
        `;
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }

    // ==================== RENDERIMI I TABELËS ====================
    function renderTable() {
        const tbody = document.getElementById('tableRows');
        
        if (!menuData || menuData.length === 0) {
            tbody.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #999;">
                    <i class="fas fa-box-open" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;"></i>
                    <p style="font-size: 1.3rem;">Nuk ka asnjë produkt në menu</p>
                    <p style="margin-top: 15px;">Klikoni "Shto Produkt të Ri" për të filluar</p>
                </div>
            `;
            return;
        }

        tbody.innerHTML = menuData.map(product => `
            <div class="table-row" data-id="${product.id}">
                <div class="product-thumb">
                    ${product.image 
                        ? `<img src="${product.image}" alt="${product.name}" onerror="this.parentElement.innerHTML='<div class=\'no-thumb\'><i class=\'fas fa-image\'></i></div>'">` 
                        : `<div class="no-thumb"><i class="fas fa-image"></i></div>`
                    }
                </div>
                <div class="product-name">${escapeHtml(product.name)}</div>
                <div><span class="product-cat">${escapeHtml(product.category)}</span></div>
                <div class="product-price">€${typeof product.price === 'number' ? product.price.toFixed(2) : parseFloat(product.price).toFixed(2)}</div>
                <div>${escapeHtml(product.description || '').substring(0, 40)}${product.description && product.description.length > 40 ? '...' : ''}</div>
                <div class="action-buttons">
                    <button class="btn-edit" onclick="editProduct('${product.id}')" title="Modifiko">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="btn-delete" onclick="deleteProduct('${product.id}')" title="Fshije">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    // Funksion për të escapuar HTML (parandalon XSS)
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ==================== FUNKSIONET CRUD ====================

    // Shto produkt (hap modal)
    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Shto Produkt të Ri';
        document.getElementById('productId').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('productCategory').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productDescription').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('previewImg').src = '';
        document.getElementById('productModal').classList.add('active');
    }

    // Modifiko produkt
    window.editProduct = function(id) {
        const product = menuData.find(p => p.id === id);
        if (!product) {
            showNotification('Produkti nuk u gjet!', 'error');
            return;
        }

        document.getElementById('modalTitle').innerText = 'Modifiko Produktin';
        document.getElementById('productId').value = product.id;
        document.getElementById('productName').value = product.name;
        document.getElementById('productCategory').value = product.category;
        document.getElementById('productPrice').value = product.price;
        document.getElementById('productDescription').value = product.description || '';

        if (product.image) {
            document.getElementById('previewImg').src = product.image;
            document.getElementById('imagePreview').style.display = 'block';
        } else {
            document.getElementById('imagePreview').style.display = 'none';
        }

        document.getElementById('productModal').classList.add('active');
    };

    // Fshij produkt
    window.deleteProduct = function(id) {
        if (confirm('A jeni i sigurt që doni ta fshini këtë produkt?')) {
            menuData = menuData.filter(p => p.id !== id);
            if (saveToStorage()) {
                renderTable();
            }
        }
    };

    // Ruaj produktin (shto ose modifiko)
    function saveProduct(event) {
        event.preventDefault();

        // Merr vlerat nga forma
        const id = document.getElementById('productId').value;
        const name = document.getElementById('productName').value.trim();
        const category = document.getElementById('productCategory').value;
        const price = parseFloat(document.getElementById('productPrice').value);
        const description = document.getElementById('productDescription').value.trim();
        const previewImg = document.getElementById('previewImg').src;

        // Validimi
        if (!name) {
            alert('Emri i produktit është i detyrueshëm!');
            return;
        }

        if (!category) {
            alert('Ju lutem zgjidhni një kategori!');
            return;
        }

        if (isNaN(price) || price <= 0) {
            alert('Çmimi duhet të jetë një numër pozitiv!');
            return;
        }

        // Përcakto foton
        let image = '';
        if (previewImg && previewImg.startsWith('data:')) {
            image = previewImg; // foto e re base64
        } else if (id) {
            const existing = menuData.find(p => p.id === id);
            if (existing && existing.image) {
                image = existing.image;
            }
        }

        // Krijo produktin
        const product = {
            id: id || Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9),
            name,
            category,
            price,
            description,
            image: image || ''
        };

        // Shto ose modifiko
        if (id) {
            menuData = menuData.map(p => p.id === id ? product : p);
            showNotification('Produkti u modifikua me sukses!');
        } else {
            menuData.push(product);
            showNotification('Produkti u shtua me sukses!');
        }

        // Ruaj dhe përditëso tabelën
        if (saveToStorage()) {
            renderTable();
            closeModal();
        }
    }

    // Mbyll modalin
    function closeModal() {
        document.getElementById('productModal').classList.remove('active');
        document.getElementById('productForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
    }

    // ==================== FUNKSIONET PËR LOGIN ====================
    // Tani përdorim Base64 encoding (më i thjeshtë dhe më i sigurt)
    function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        
        // Dekodojmë fjalëkalimin e ruajtur
        const correctPassword = decodeBase64(ADMIN_PASSWORD_ENCODED);
        
        // Krahasojmë direkt
        if (password === correctPassword) {
            // Fsheh login, shfaq admin panel
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            
            // Inicializo dhe shfaq të dhënat
            initializeData();
            renderTable();
            
            showNotification('Hyrja u krye me sukses!');
        } else {
            document.getElementById('loginError').innerText = '❌ Fjalëkalimi i gabuar!';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }
    }

    // ==================== FUNKSIONET PËR FOTO ====================

    function setupImageUpload() {
        const uploadArea = document.getElementById('imageUploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewImg = document.getElementById('previewImg');
        const imagePreview = document.getElementById('imagePreview');

        // Kliko për të ngarkuar
        uploadArea.addEventListener('click', () => {
            imageInput.click();
        });

        // Drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#4a4a4a';
            uploadArea.style.borderColor = '#d94f2b';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#363636';
            uploadArea.style.borderColor = '#d94f2b';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#363636';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageFile(file);
            }
        });

        // Ndryshimi i file input
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageFile(file);
            }
        });

        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    // ==================== INIT DHE EVENT LISTENERS ====================

    document.addEventListener('DOMContentLoaded', function() {
        console.log('Admin panel u ngarkua');
        
        // Setup listeners
        document.getElementById('loginBtn').addEventListener('click', checkPassword);
        
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
        
        document.getElementById('addProductBtn').addEventListener('click', openAddModal);
        
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        
        document.getElementById('productForm').addEventListener('submit', saveProduct);
        
        // Setup image upload
        setupImageUpload();
        
        // Mbyll modal kur klikon jashtë
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('productModal');
            if (e.target === modal) {
                closeModal();
            }
        });

        // Keyboard shortcut: ESC për të mbyllur modalin
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Kontrollo nëse përdoruesi është tashmë i kyçur (për demo, jo)
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('passwordInput').focus();
    });

    // Ekspozo funksionet e nevojshme globalisht
    window.openAddModal = openAddModal;
    window.closeModal = closeModal;
    window.saveProduct = saveProduct;
</script>
</body>
</html>
